<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <script src="script.js" defer></script>
  <title>Contact form</title>
</head>
<body>
  <main>
    <h1>Contact Us</h1>
    <form id="contact-form" novalidate>
      <div class="name-row">
        <div>
          <label for="first-name">First Name <span aria-hidden="true" class="required">*</span></label>
          <input
            type="text"
            id="first-name"
            name="first-name"
            autocomplete="given-name"
            aria-describedby="first-name-error"
            required>
          <span class="error-message" id="first-name-error" aria-live="polite">This field is required</span>
        </div>

        <div>
          <label for="last-name">Last Name <span aria-hidden="true" class="required">*</span></label>
          <input
            type="text"
            id="last-name"
            name="last-name"
            autocomplete="family-name"
            aria-describedby="last-name-error"
            required>
          <span class="error-message" id="last-name-error" aria-live="polite">This field is required</span>
        </div>
      </div>

      <div>
        <label for="email">Email Address <span aria-hidden="true" class="required">*</span></label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          aria-describedby="email-error"
          required>
        <span class="error-message" id="email-error" aria-live="polite">Please enter a valid email address.</span>
      </div>

      <fieldset>
        <legend>Query Type <span aria-hidden="true" class="required">*</span></legend>

        <div class="radio-row">
          <div class="radio-option">
            <input type="radio" id="general-enquiry" name="query" value="general-enquiry">
            <label for="general-enquiry">General Enquiry</label>
          </div>

          <div class="radio-option">
            <input type="radio" id="support-request" name="query" value="support-request">
            <label for="support-request">Support Request</label>
          </div>
        </div>

        <span class="error-message" id="query-error" aria-live="polite">Please select a query type</span>
      </fieldset>

      <div>
        <label for="message">Message <span aria-hidden="true" class="required">*</span></label>
        <textarea
          id="message"
          name="message"
          aria-describedby="message-error"
          required></textarea>
        <span class="error-message" id="message-error" aria-live="polite">This field is required</span>
      </div>

      <div>
        <div class="consent-flex">
          <input
            type="checkbox"
            id="consent"
            name="consent"
            value="consent"
            aria-describedby="consent-error"
            required>
          <label for="consent">I consent to being contacted by the team <span aria-hidden="true" class="required">*</span></label>
        </div>
        <span class="error-message" id="consent-error" aria-live="polite">To submit this form, please consent to being contacted</span>
      </div>

      <button type="submit" id="submit-btn">Submit</button>
    </form>

    <div class="top-notification" role="alert" aria-live="assertive" hidden>
      <div>
        <img src="/images/icon-success-check.svg" alt="" aria-hidden="true">
        <p class="message-sent">Message Sent!</p>
      </div>
      <p>Thanks for completing the form. We'll be in touch soon!</p>
    </div>
  </main>
</body>
</html>
